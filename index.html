    <style>
      body {
        background-color: #131313;
        color: #e5e2e1;
        overflow-x: hidden;
      }
      .gold-border-gradient {
        border-image: linear-gradient(
            to bottom right,
            #ffdea5,
            #e9c176,
            #604403
          )
          1;
      }
      .matte-overlay {
        background: linear-gradient(
          180deg,
          rgba(18, 18, 18, 0) 0%,
          rgba(18, 18, 18, 0.95) 100%
        );
      }
      .diamond-divider::after {
        content: "◆";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: #131313;
        padding: 0 10px;
        color: #e9c176;
        font-size: 10px;
      }
      .floating-accent {
        filter: blur(80px);
        opacity: 0.1;
      }
    </style>
    <script>
      // Micro-interactions and atmospheric scroll effects
      window.addEventListener("scroll", () => {
        const nav = document.querySelector("nav");

        if (!nav) return;

        if (window.scrollY > 50) {
          nav.classList.add("shadow-2xl");
          nav.classList.remove("bg-background/70");
          nav.classList.add("bg-background/95");
        } else {
          nav.classList.remove("shadow-2xl");
          nav.classList.remove("bg-background/95");
          nav.classList.add("bg-background/70");
        }
      });

      // Simple entrance animations for cards
      const observerOptions = {
        threshold: 0.1,
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("opacity-100", "translate-y-0");
            entry.target.classList.remove("opacity-0", "translate-y-10");
          }
        });
      }, observerOptions);

      document
        .querySelectorAll(".bg-surface-container, .bg-surface-container-high")
        .forEach((el) => {
          el.classList.add(
            "transition-all",
            "duration-700",
            "opacity-0",
            "translate-y-10",
          );
          observer.observe(el);
        });
    </script>
